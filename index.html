<!-- الإنتاج -->

    <!-- منفوحة -->
    <div class="field">

    </div>

    <!-- الشميسي -->
    <div class="field">
      <label>إنتاج الشميسي</label>
      <input type="number" id="s_prod">
    </div>

    <div class="field">
      <label>تصدير الشميسي</label>
      <input type="number" id="s_export">
    </div>

    <!-- الاحتياطي -->
    <div class="field">
      <label>الإنتاج الاحتياطي</label>
      <input
