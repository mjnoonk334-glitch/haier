<!-- الإنتاج -->
<div class="section">

  <div class="section-header">
    💧 مخرجات المحطات
  </div>

  <div class="grid">

    <!-- الحاير -->
    <div class="field">
      <label>إنتاج الحاير</label>
      <input type="number" id="h_prod">
    </div>

    <div class="field">
      <label>تصدير الحاير</label>
      <input type="number" id="h_export">
    </div>

    <!-- منفوحة -->
    <div class="field">
      <label>إنتاج منفوحة</label>
      <input type="number" id="m_prod">
    </div>

    <div class="field">
      <label>تصدير منفوحة</label>
      <input type="number" id="m_export">
    </div>

    <!-- الشميسي -->
    <div class="field">
      <label>إنتاج الشميسي</label>
      <input type="number" id="s_prod">
    </div>

    <div class="field">
      <label>تصدير الشميسي</label>
      <input type="number" id="s_export">
    </div>

    <!-- الاحتياطي -->
    <div class="field">
      <label>الإنتاج الاحتياطي</label>
      <input
        type="number"
        id="h_spare"
        readonly
        class="readonly-field">
    </div>

  </div>

</div>
<!-- الصيانة -->
<div class="section">

  <div class="section-header">
    🛠️ تقرير الصيانة
  </div>

  <div id="maintenanceContainer">

    <div class="maintenance-row grid">

      <div class="field">
        <label>المعدة</label>
        <input type="text" class="m_equip">
      </div>

      <div class="field">
        <label>الموقع</label>
        <input type="text" class="m_loc">
      </div>

      <div class="field full-width">
        <label>وصف العمل</label>
        <textarea class="m_desc"></textarea>
      </div>

    </div>

  </div>

  <button
    type="button"
    id="addMaintenanceBtn"
    class="btn-export"
    style="margin-top:10px;">

    + إضافة سطر صيانة

  </button>

</div>
<!-- التوقيع -->
<div class="section">

  <div class="section-header">
    👤 التوقيع
  </div>

  <div class="grid">

    <div class="field">
      <label>معد التقرير</label>
      <input type="text" id="reporter_name">
    </div>

    <div class="field">
      <label>المشرف</label>
      <input type="text" id="supervisor_name">
    </div>

  </div>

</div>
