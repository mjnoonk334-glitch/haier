<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير وحدة تنقية الحاير</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f4f8; padding: 10px; margin: 0; padding-bottom: 100px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #0D47A1; text-align: center; border-bottom: 3px solid #0D47A1; padding-bottom: 10px; }
        .section { border: 1px solid #bbdefb; border-radius: 10px; padding: 15px; margin-bottom: 20px; background: #fff; }
        .section-header { background-color: #0D47A1; color: white; padding: 10px 15px; border-radius: 8px; margin: -15px -15px 15px -15px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.85em; color: #1565C0; margin-bottom: 4px; font-weight: bold; }
        input, textarea { padding: 12px; border: 1px solid #90caf9; border-radius: 8px; font-size: 16px; background-color: #fdfdfd; }
        input:focus { border-color: #0D47A1; outline: none; background: #fff; }
        .full-width { grid-column: 1 / -1; }
        
        /* شريط الأزرار السفلي العائم */
        .toolbar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: #ffffff; 
            padding: 15px; 
            display: flex; 
            gap: 8px; 
            box-shadow: 0 -4px 15px rgba(0,0,0,0.15); 
            z-index: 1000;
            border-top: 2px solid #0D47A1;
        }
        
        button { 
            flex: 1; 
            padding: 12px 5px; 
            border: none; 
            border-radius: 10px; 
            font-size: 14px; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            gap: 5px;
            transition: 0.2s;
        }

        .btn-save { background-color: #007bff; color: white; } /* زر الحفظ أزرق */
        .btn-export { background-color: #2E7D32; color: white; } /* زر الإكسل أخضر */
        .btn-reset { background-color: #f8f9fa; color: #dc3545; border: 1px solid #dc3545; flex: 0.6; } /* زر المسح */

        button:active { transform: scale(0.95); opacity: 0.8; }
        .icon { font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>تقرير تشغيل وحدة الحاير</h2>

    <form id="mainForm">
        <div class="section">
            <div class="section-header">📍 بيانات عامة</div>
            <div class="grid">
                <div class="field"><label>التاريخ</label><input type="date" id="reportDate"></div>
                <div class="field"><label>الاستهلاك (MW/DAY)</label><input type="number" id="power"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">💧 مخرجات المحطة (الشميسي)</div>
            <div class="grid">
                <div class="field"><label>كمية إنتاج</label><input type="number" id="sh_prod"></div>
                <div class="field"><label>كمية تصدير</label><input type="number" id="sh_export"></div>
                <div class="field"><label>إنتاج احتياطي</label><input type="number" id="sh_spare"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">💧 مخرجات المحطة (منفوحة)</div>
            <div class="grid">
                <div class="field"><label>كمية إنتاج</label><input type="number" id="mn_prod"></div>
                <div class="field"><label>كمية تصدير</label><input type="number" id="mn_export"></div>
                <div class="field"><label>إنتاج احتياطي</label><input type="number" id="mn_spare"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">🚜 حالة الآبار</div>
            <div class="grid">
                <div class="field"><label>آبار في الخدمة</label><input type="number" id="wells_in"></div>
                <div class="field"><label>آبار خارج الخدمة</label><input type="number" id="wells_out"></div>
                <div class="field full-width"><label>ملاحظات الآبار</label><textarea id="well_notes" rows="2"></textarea></div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">🧪 جودة المياه (Product Water)</div>
            <div class="grid">
                <div class="field"><label>Temp</label><input type="number" step="0.1" id="q_temp"></div>
                <div class="field"><label>Turbidity</label><input type="number" step="0.1" id="q_turb"></div>
                <div class="field"><label>Free Chlorine</label><input type="number" step="0.1" id="q_cl"></div>
                <div class="field"><label>pH</label><input type="number" step="0.1" id="q_ph"></div>
                <div class="field"><label>Conductivity</label><input type="number" id="q_cond"></div>
                <div class="field"><label>TDS</label><input type="number" id="q_tds"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">🛠️ تقرير الصيانة</div>
            <div class="grid">
                <div class="field"><label>المعدة</label><input type="text" id="m_equip"></div>
                <div class="field"><label>الموقع</label><input type="text" id="m_loc"></div>
                <div class="field full-width"><label>وصف العمل</label><textarea id="m_desc" rows="2"></textarea></div>
            </div>
        </div>
    </form>
</div>

<div class="toolbar">
    <button class="btn-reset" onclick="resetData()">
        <span class="icon">🗑️</span>
        <span>مسح</span>
    </button>
    <button class="btn-save" onclick="saveToDevice()">
        <span class="icon">💾</span>
        <span>حفظ التعديلات</span>
    </button>
    <button class="btn-export" onclick="exportExcel()">
        <span class="icon">📊</span>
        <span>تصدير Excel</span>
    </button>
</div>

<script>
    // استرجاع البيانات عند فتح الصفحة
    window.onload = function() {
        document.getElementById('reportDate').valueAsDate = new Date();
        const savedData = localStorage.getItem('alhair_v2_data');
        if (savedData) {
            const data = JSON.parse(savedData);
            Object.keys(data).forEach(key => {
                if(document.getElementById(key)) document.getElementById(key).value = data[key];
            });
        }
    };

    // وظيفة حفظ التعديلات في ذاكرة الجوال
    function saveToDevice() {
        const formData = {};
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => formData[input.id] = input.value);
        localStorage.setItem('alhair_v2_data', JSON.stringify(formData));
        alert('✅ تم حفظ البيانات في جوالك بنجاح!');
    }

    function resetData() {
        if(confirm('هل أنت متأكد من مسح جميع البيانات المدخلة؟')) {
            localStorage.removeItem('alhair_v2_data');
            location.reload();
        }
    }

    function exportExcel() {
        const date = document.getElementById('reportDate').value;
        const reportData = [
            ["تقرير وحدة تنقية الحاير اليومي"],
            ["التاريخ:", date],
            [],
            ["الجهة", "إنتاج (م3)", "تصدير (م3)", "احتياطي (م3)"],
            ["الشميسي", document.getElementById('sh_prod').value, document.getElementById('sh_export').value, document.getElementById('sh_spare').value],
            ["منفوحة", document.getElementById('mn_prod').value, document.getElementById('mn_export').value, document.getElementById('mn_spare').value],
            [],
            ["حالة الآبار", "في الخدمة:", document.getElementById('wells_in').value, "خارج الخدمة:", document.getElementById('wells_out').value],
            ["ملاحظات الآبار:", document.getElementById('well_notes').value],
            [],
            ["جودة المياه", "القيمة"],
            ["Temp", document.getElementById('q_temp').value],
            ["Turbidity", document.getElementById('q_turb').value],
            ["Free Chlorine", document.getElementById('q_cl').value],
            ["pH", document.getElementById('q_ph').value],
            ["Conductivity", document.getElementById('q_cond').value],
            ["TDS", document.getElementById('q_tds').value],
            [],
            ["تقرير الصيانة", "المعدة", "الموقع", "وصف العمل"],
            ["", document.getElementById('m_equip').value, document.getElementById('m_loc').value, document.getElementById('m_desc').value]
        ];

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(reportData);
        ws['!dir'] = "rtl";
        XLSX.utils.book_append_sheet(wb, ws, "تقرير الحاير");
        XLSX.writeFile(wb, `تقرير_الحاير_${date}.xlsx`);
    }
</script>

</body>
</html>
