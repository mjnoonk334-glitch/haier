<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>تقرير تشغيل محطة الحاير</title>

  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/print.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

  <div class="container">

    <h2>تقرير تشغيل محطة الحاير</h2>

    <form id="mainForm">

      <!-- البيانات العامة -->
      <div class="section">

        <div class="section-header">
          📍 البيانات العامة
        </div>

        <div class="grid">

          <div class="field">
            <label>التاريخ</label>
            <input type="date" id="reportDate">
          </div>

          <div class="field">
            <label>الاستهلاك (MW/DAY)</label>
            <input type="number" id="power">
          </div>

        </div>
      </div>

      <!-- الإنتاج -->
      <div class="section">

        <div class="section-header">
          💧 مخرجات محطة الحاير
        </div>

        <div class="grid">

          <div class="field">
            <label>السعة التشغيلية</label>
            <input
              type="number"
              id="h_capacity"
              value="50000"
              readonly
              class="readonly-field">
          </div>

          <div class="field">
            <label>كمية الإنتاج</label>
            <input type="number" id="h_prod">
          </div>

          <div class="field">
            <label>الإنتاج الاحتياطي</label>
            <input
              type="number"
              id="h_spare"
              readonly
              class="readonly-field">
          </div>

          <div class="field">
            <label>كمية التصدير</label>
            <input type="number" id="h_export">
          </div>

        </div>
      </div>

      <!-- الآبار -->
      <div class="section">

        <div class="section-header">
          🚜 حالة الآبار
        </div>

        <div class="grid">

          <div class="field">
            <label>آبار في الخدمة</label>
            <input type="number" id="wells_in">
          </div>

          <div class="field">
            <label>آبار خارج الخدمة</label>
            <input type="number" id="wells_out">
          </div>

          <div class="field full-width">
            <label>ملاحظات الآبار</label>
            <textarea id="well_notes"></textarea>
          </div>

        </div>
      </div>

      <!-- الجودة -->
      <div class="section">

        <div class="section-header">
          🧪 جودة المياه
        </div>

        <div class="grid">

          <div class="field">
            <label>Temp</label>
            <input type="number" step="0.1" id="q_temp">
          </div>

          <div class="field">
            <label>Turbidity</label>
            <input type="number" step="0.1" id="q_turb">
          </div>

          <div class="field">
            <label>Free Cl</label>
            <input type="number" step="0.1" id="q_cl">
          </div>

          <div class="field">
            <label>pH</label>
            <input type="number" step="0.1" id="q_ph">
          </div>

          <div class="field">
            <label>Cond.</label>
            <input type="number" id="q_cond">
          </div>

          <div class="field">
            <label>TDS</label>
            <input type="number" id="q_tds">
          </div>

        </div>
      </div>

      <!-- الصيانة -->
      <div class="section">

        <div class="section-header">
          🛠️ تقرير الصيانة
        </div>

        <div class="grid">

          <div class="field">
            <label>المعدة</label>
            <input type="text" id="m_equip">
          </div>

          <div class="field">
            <label>الموقع</label>
            <input type="text" id="m_loc">
          </div>

          <div class="field full-width">
            <label>وصف العمل</label>
            <textarea id="m_desc"></textarea>
          </div>

        </div>
      </div>

      <!-- التوقيع -->
      <div class="section">

        <div class="section-header">
          👤 التوقيع
        </div>

        <div class="grid">

          <div class="field full-width">
            <label>معد التقرير</label>
            <input type="text" id="reporter_name">
          </div>

        </div>
      </div>

    </form>

  </div>

  <!-- toolbar -->
  <div class="toolbar">

    <button id="resetBtn" class="btn-reset">
      🗑️ مسح
    </button>

    <button id="saveBtn" class="btn-save">
      💾 حفظ
    </button>

    <button id="excelBtn" class="btn-export">
      📊 Excel
    </button>

    <button id="printBtn" class="btn-export">
      🖨️ طباعة
    </button>

  </div>

  <script type="module" src="./js/app.js"></script>

</body>

</html>
